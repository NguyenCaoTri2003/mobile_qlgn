workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      vars:
        XCODE_WORKSPACE: "ios/mobile_qlgn.xcworkspace"
        XCODE_SCHEME: "mobile_qlgn"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Generate iOS project
        script: npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build IPA
        script: |
          xcodebuild \
          -workspace ios/mobile_qlgn.xcworkspace \
          -scheme mobile_qlgn \
          -configuration Release \
          -archivePath build/ios/archive/mobile_qlgn.xcarchive archive

          xcodebuild -exportArchive \
          -archivePath build/ios/archive/mobile_qlgn.xcarchive \
          -exportPath build/ios/ipa \
          -exportOptionsPlist ios/exportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa